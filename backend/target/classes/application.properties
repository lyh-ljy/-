spring.application.name=crm-backend
server.port=8080

# HTTP 请求编码
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# MySQL 数据库连接
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/crm_db?serverTimezone=Asia/Shanghai&useSSL=false&characterEncoding=UTF-8&tinyInt1isBit=false
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.crm.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 逻辑删除
mybatis-plus.global-config.db-config.logic-delete-field=isDeleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
